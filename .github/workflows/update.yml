name: Update Medicaid Fee Schedules

on:
  schedule:
    - cron: '0 8 * * 1'
  push:
    paths:
      - '.github/workflows/update.yml'
      - 'scripts/export_web.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas lxml openpyxl

      - name: Run scraper pipeline
        run: python main.py
        continue-on-error: true

      - name: Export web data
        run: python scripts/export_web.py

      - name: Copy web data to docs
        run: |
          mkdir -p docs/data
          cp data/web/*.json docs/data/ 2>/dev/null || echo "No web data files to copy"
          echo "docs/data contents:"
          ls -la docs/data/ || echo "empty"

      - name: Commit and push
        run: |
          git add -A docs/data/
          git add -A data/web/
          git add data/checksums.json 2>/dev/null || true
          git add data/prev_rates/ 2>/dev/null || true
          git add data/base_rates.json 2>/dev/null || true
          git add data/rate_comparison.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "data: update fee schedules $(date +%Y-%m-%d)"
            git push
          fi
