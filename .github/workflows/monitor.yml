name: Medicaid Fee Schedule Monitor
on:
  schedule:
    - cron: '0 12 * * 1-5'   # Mon–Fri at 12:00 UTC (8am ET)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
        run: python main.py
      - name: Commit updated checksums and downloaded files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/checksums.json data/base_rates.json data/rate_comparison.json data/mco/ -f || true
          git add data/downloads/ -f || true
          git diff --cached --quiet || git commit -m "chore: update data $(date -u +'%Y-%m-%d')" && git push
